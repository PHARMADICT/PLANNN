<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B3D91">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ShelfRx Pro – Boots T3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{
  --navy:#0B3D91;--navy2:#1A52B3;--teal:#00A3A3;--teal-bg:#E0F7F7;
  --cream:#F4F6FB;--white:#fff;--ink:#111827;--muted:#6B7280;
  --border:#E5E7EB;--green:#059669;--green-bg:#ECFDF5;
  --amber:#D97706;--amber-bg:#FFFBEB;--red:#DC2626;--red-bg:#FEF2F2;
  --r:14px;--rs:8px;--sh:0 1px 4px rgba(0,0,0,.08);--shm:0 4px 18px rgba(0,0,0,.11);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
.topbar{background:var(--navy);color:#fff;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shm)}
.tl{display:flex;align-items:center;gap:10px}
.tlogo{width:34px;height:34px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ttitle{font-size:17px;font-weight:800;letter-spacing:-.3px}
.tsub{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.topbtns{display:flex;gap:6px}
.tadd{background:rgba(255,255,255,.13);border:none;color:#fff;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.tadd:active{background:rgba(255,255,255,.24)}
.tscan{background:var(--teal);border:none;color:#fff;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.screen{display:none;padding:16px 14px 90px;animation:fi .18s ease}
.screen.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.expiry-banner{background:var(--red-bg);border:2px solid var(--red);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.expiry-banner-title{font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.expiry-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.expiry-card{background:var(--white);border:3px solid var(--red);border-radius:var(--rs);padding:10px;box-shadow:0 0 0 2px rgba(220,38,38,.12)}
.expiry-name{font-size:11px;font-weight:700;margin-bottom:4px;color:var(--ink);line-height:1.3}
.expiry-meta{font-size:10px;color:var(--red);font-weight:600;font-family:'DM Mono',monospace}
.expiry-shelf{font-size:10px;color:var(--muted);margin-top:2px}
.sec-hd{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
.sec-bar{width:4px;height:22px;border-radius:2px;flex-shrink:0}
.sec-name{font-size:14px;font-weight:800;letter-spacing:-.2px;line-height:1.3}
.sec-cnt{font-size:11px;color:var(--muted);margin-left:auto;font-weight:500;white-space:nowrap}
.rack-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.rack-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .18s,transform .12s}
.rack-card:active{transform:scale(.97)}
.rack-card.alert{border-color:var(--amber)}
.rack-thumb{width:100%;height:76px;position:relative;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.rack-thumb img{width:100%;height:100%;object-fit:cover}
.rack-badge{position:absolute;top:6px;left:6px;background:var(--navy);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.rack-alert-dot{position:absolute;top:6px;right:6px;background:var(--amber);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.rack-info{padding:9px 12px}
.rack-name{font-size:13px;font-weight:700;margin-bottom:3px}
.rack-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--teal);display:inline-block}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--navy);cursor:pointer;padding:0;margin-bottom:14px}
.rack-hd{margin-bottom:14px}
.rack-hd h2{font-size:20px;font-weight:800;letter-spacing:-.3px}
.rack-hd p{font-size:12px;color:var(--muted);margin-top:3px}
.rack-sec-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.shelf-row{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;border-left:4px solid var(--border)}
.shelf-row.s-ok{border-left-color:var(--teal)}
.shelf-row.s-low{border-left-color:var(--amber)}
.shelf-row.s-out{border-left-color:var(--red)}
.shelf-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px 9px;cursor:pointer;gap:8px}
.shelf-code{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--navy);background:#EEF2FF;padding:3px 9px;border-radius:6px;white-space:nowrap}
.shelf-hd-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.shelf-cnt{font-size:11px;color:var(--muted);white-space:nowrap}
.chev{transition:transform .2s;color:var(--muted);flex-shrink:0}
.shelf-body{display:none;padding:0 13px 13px;border-top:1px solid var(--border)}
.shelf-body.open{display:block}
.prod-mini{border-radius:var(--rs);border:1.5px solid var(--border);margin-bottom:8px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.prod-mini.near-expiry{border:3px solid var(--red)!important;box-shadow:0 0 0 3px rgba(220,38,38,.15),0 2px 8px rgba(220,38,38,.18)!important}
.prod-mini-top{display:flex;align-items:flex-start;gap:8px;padding:10px 10px 6px}
.prod-img-wrap{width:52px;height:52px;border-radius:var(--rs);background:linear-gradient(135deg,#EEF2FF,#E0F7F7);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;position:relative}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover}
.prod-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s}
.prod-img-wrap:hover .prod-img-overlay{opacity:1}
.prod-img-overlay span{color:#fff;font-size:18px}
.prod-main{flex:1;min-width:0}
.pm-name{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.35}
.pm-barcode{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:2px}
.pm-alshaya{font-size:10px;color:#7C3AED;font-family:'DM Mono',monospace;margin-bottom:3px}
.pm-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;font-family:'DM Mono',monospace}
.tl2{background:#EEF2FF;color:#4338CA}
.tf{background:#F5F3FF;color:#7C3AED}
.tp{background:#F0FDF4;color:var(--green);font-weight:700}
.texp{background:var(--red-bg);color:var(--red);font-weight:700}
.texpok{background:var(--green-bg);color:var(--green)}
.prod-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.stock-ctrl{display:flex;align-items:center;gap:4px}
.sbtn{width:24px;height:24px;border-radius:50%;background:var(--cream);border:1.5px solid var(--border);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbtn:active{background:var(--border)}
.snum{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;min-width:22px;text-align:center}
.chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.c-ok{background:var(--green-bg);color:var(--green)}
.c-low{background:var(--amber-bg);color:var(--amber)}
.c-out{background:var(--red-bg);color:var(--red)}
.c-exp{background:var(--red-bg);color:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.prod-mini-footer{padding:6px 10px 8px;border-top:1px dashed var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.prod-actions-row{display:flex;gap:5px}
.ibtn{width:26px;height:26px;border-radius:6px;background:var(--cream);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.ibtn:active{background:var(--border)}
.expiry-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--red-bg);color:var(--red);margin-left:auto}
.remarks-text{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;padding:0 10px 6px;line-height:1.4}
.shelf-photo-wrap{border-radius:var(--rs);overflow:hidden;height:80px;background:linear-gradient(135deg,#EEF2FF,#E0F7F7);display:flex;align-items:center;justify-content:center;margin-bottom:11px;position:relative;cursor:pointer}
.shelf-photo-wrap img{width:100%;height:100%;object-fit:cover}
.ph-icon{font-size:26px;opacity:.3}
.ph-label{position:absolute;bottom:5px;right:7px;background:rgba(255,255,255,.92);color:var(--navy);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
.add-shelf-btn{width:100%;padding:9px;background:var(--teal-bg);color:var(--teal);border:1.5px dashed var(--teal);border-radius:var(--rs);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.empty-shelf{text-align:center;padding:12px;color:var(--muted);font-size:11px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:13px;display:flex;align-items:center;gap:11px}
.sic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sv{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;line-height:1}
.sl{font-size:10px;color:var(--muted);margin-top:2px}
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:10px 13px 10px 38px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;background:var(--white);outline:none}
.search-inp:focus{border-color:var(--navy)}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:150;box-shadow:0 -4px 14px rgba(0,0,0,.06)}
.nb{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;position:relative}
.nb.active{color:var(--navy)}
.nb svg{width:20px;height:20px}
.ni{position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:3px;background:var(--navy);border-radius:0 0 3px 3px;opacity:0;transition:opacity .18s}
.nb.active .ni{opacity:1}
.mbk{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end}
.mbk.open{display:flex}
.modal{background:var(--white);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:16px;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.fi2{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;color:var(--ink);background:var(--white);outline:none}
.fi2:focus{border-color:var(--navy)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fsel{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;color:var(--ink);background:var(--white);outline:none;appearance:none}
.btn-p{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-p:active{background:var(--navy2)}
.btn-s{width:100%;padding:11px;background:var(--cream);color:var(--muted);border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-teal{width:100%;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
.scan-modal{background:var(--white);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:95vh;overflow-y:auto;padding:20px 16px 40px}
#scannerVideo{width:100%;border-radius:var(--r);background:#000;aspect-ratio:4/3;display:block}
.scan-result-card{background:var(--white);border:2px solid var(--teal);border-radius:var(--r);padding:16px;margin-top:14px}
.scan-result-name{font-size:16px;font-weight:800;margin-bottom:6px}
.scan-result-code{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:10px}
.scan-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.scan-stat{background:var(--cream);border-radius:var(--rs);padding:10px;text-align:center}
.scan-stat-val{font-size:18px;font-weight:800;font-family:'DM Mono',monospace}
.scan-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.sell-box{background:#EEF2FF;border-radius:var(--rs);padding:12px;margin-bottom:10px}
.sell-box-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sell-box-text{font-size:12px;line-height:1.6;color:var(--ink)}
.translate-panel{margin-top:10px}
.lang-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.lang-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)}
.lang-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.translation-box{background:var(--cream);border-radius:var(--rs);padding:12px;min-height:60px;font-size:13px;line-height:1.7;direction:ltr}
.translation-box.rtl{direction:rtl;text-align:right;font-size:14px}
.translation-loading{color:var(--muted);font-style:italic;font-size:12px}
.prod-detail-img{width:100%;height:140px;border-radius:var(--r);object-fit:cover;margin-bottom:12px;background:linear-gradient(135deg,#EEF2FF,#E0F7F7);display:flex;align-items:center;justify-content:center;font-size:48px}
.all-prod-card{background:var(--white);border-radius:var(--rs);padding:11px 12px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-left:4px solid var(--border)}
.all-prod-card.near-expiry{border-left-color:var(--red)!important;border:3px solid var(--red);box-shadow:0 0 0 2px rgba(220,38,38,.13)!important}
.lbl-sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px;margin-top:4px}
.expiry-days-red{color:var(--red);font-weight:700}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">
    <div class="tlogo">💊</div>
    <div><div class="ttitle">ShelfRx</div><div class="tsub">Boots T3 · Planogram MAY 2026</div></div>
  </div>
  <div class="topbtns">
    <button class="tscan" onclick="openScanner()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>Scan
    </button>
    <button class="tadd" id="topAddBtn" onclick="openAddModal()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add
    </button>
  </div>
</div>
<div class="screen active" id="screen-racks"></div>
<div class="screen" id="screen-detail">
  <button class="back-btn" onclick="goBack()"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>All Racks</button>
  <div id="detailInner"></div>
</div>
<div class="screen" id="screen-summary">
  <div class="lbl-sec">Store Overview</div>
  <div class="stat-row" id="summaryStats"></div>
  <div id="nearExpiryBanner"></div>
  <div class="lbl-sec">All Products</div>
  <div class="search-wrap">
    <svg class="sico" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-inp" type="search" placeholder="Search name, barcode, Alshaya code…" oninput="filterAll(this.value)" id="searchInp">
  </div>
  <div id="allList"></div>
</div>
<nav class="bnav">
  <button class="nb active" onclick="switchTab('racks')" id="nav-racks"><div class="ni"></div><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Racks</button>
  <button class="nb" onclick="switchTab('summary')" id="nav-summary"><div class="ni"></div><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 3h18v4H3zM3 10h18v4H3zM3 17h18v4H3z"/></svg>All Products</button>
</nav>
<div class="mbk" id="modalBk" onclick="closeMbk(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <h3 id="mTitle">Add Product</h3>
    <input type="hidden" id="eId">
    <div class="fg"><label class="fl">Product Name</label><input class="fi2" type="text" id="fName" placeholder="e.g. Vital Collagen 500mg"></div>
    <div class="fg"><label class="fl">Barcode</label><input class="fi2" type="text" id="fBarcode" placeholder="e.g. 5019781022700"></div>
    <div class="fg"><label class="fl">Alshaya Code</label><input class="fi2" type="text" id="fAlshaya" placeholder="e.g. WOBOWO…"></div>
    <div class="frow">
      <div class="fg"><label class="fl">Rack</label><select class="fsel" id="fRack" onchange="updateShelfOpts()"></select></div>
      <div class="fg"><label class="fl">Shelf</label><select class="fsel" id="fShelf"></select></div>
    </div>
    <div class="fg"><label class="fl">Shelf Type / Notch</label><input class="fi2" type="text" id="fNotch" placeholder='e.g. 12" Wooden Notch:33'></div>
    <div class="frow">
      <div class="fg"><label class="fl">Facing</label><input class="fi2" type="number" id="fFacing" placeholder="1" min="1"></div>
      <div class="fg"><label class="fl">Stock Qty</label><input class="fi2" type="number" id="fStock" placeholder="0" min="0"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Lines</label><input class="fi2" type="number" id="fLines" placeholder="1" min="1"></div>
      <div class="fg"><label class="fl">Price (AED)</label><input class="fi2" type="number" id="fPrice" placeholder="0.00" step="0.01"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">Expiry Date</label><input class="fi2" type="date" id="fExpiry"></div>
      <div class="fg"><label class="fl">Expiry Qty</label><input class="fi2" type="number" id="fExpiryQty" placeholder="0" min="0"></div>
    </div>
    <div class="fg"><label class="fl">Remarks / Notes</label><textarea class="fi2" id="fRemarks" rows="2" placeholder="e.g. Keep refrigerated, check temp daily" style="resize:vertical"></textarea></div>
    <div class="fg"><label class="fl">Product Image</label>

function daysUntilExpiry(dateStr){
  if(!dateStr)return null;
  const now=new Date();now.setHours(0,0,0,0);
  const exp=new Date(dateStr);
  return Math.round((exp-now)/(1000*60*60*24));

function translateText(text,langCode){
  const dict=TRANSLATIONS[langCode]||{};
  if(dict[text])return dict[text];
  let result=text;
  for(const[en,trans] of Object.entries(dict)){
    if(text.toLowerCase().includes(en.toLowerCase())){
      result=result.replace(new RegExp(en,'gi'),trans);
    }
  }
  if(result===text){
    const msgs={ar:'(النص الأصلي: ',fr:'(Texte original: '};
    return (msgs[langCode]||'(Original: ')+text+')';
  }
  return result;
}

  document.getElementById('eId').value='';document.getElementById('fName').value='';
  document.getElementById('fBarcode').value='';document.getElementById('fAlshaya').value='';
  buildRackOpts(currentRack);updateShelfOpts();
  document.getElementById('fNotch').value='';document.getElementById('fFacing').value='1';
  document.getElementById('fStock').value='0';document.getElementById('fLines').value='1';document.getElementById('fPrice').value='0';
  document.getElementById('fExpiry').value='';document.getElementById('fExpiryQty').value='0';document.getElementById('fRemarks').value='';
  document.getElementById('imgPreview').innerHTML='📷';
  document.getElementById('mTitle').textContent='Add Product';document.getElementById('modalBk').classList.add('open');
}
function openAddForShelf(rack,shelf){
  openAddModal();document.getElementById('fRack').value=rack;updateShelfOpts();document.getElementById('fShelf').value=shelf;
}
function closeMbk(e){if(e.target===document.getElementById('modalBk'))closeModal();}
function closeModal(){document.getElementById('modalBk').classList.remove('open');}
function saveProduct(){
  const name=document.getElementById('fName').value.trim();if(!name){document.getElementById('fName').focus();return;}
  const rack=parseInt(document.getElementById('fRack').value);const shelf=parseInt(document.getElementById('fShelf').value);
  const facing=parseInt(document.getElementById('fFacing').value)||1;const stock=parseInt(document.getElementById('fStock').value)||0;
  const lines=parseInt(document.getElementById('fLines').value)||1;const price=parseFloat(document.getElementById('fPrice').value)||0;
  const barcode=document.getElementById('fBarcode').value.trim();const alshaya=document.getElementById('fAlshaya').value.trim();
  const notchRaw=document.getElementById('fNotch').value.trim();
  const expiry=document.getElementById('fExpiry').value;
  const expiryQty=parseInt(document.getElementById('fExpiryQty').value)||0;
  const remarks=document.getElementById('fRemarks').value.trim();
  const id=document.getElementById('eId').value;
  const extraData={expiry,expiryQty,remarks};
  if(id){
    S.stockOverrides[id]=stock;setExtra(id,extraData);
    if(_pendingImg)S.prodImgs[id]=_pendingImg;
    const pp=PLANOGRAM.find(x=>x.id===id);
    if(pp)Object.assign(pp,{name,rack,shelf,facing,lines,price,barcode,alshaya});
    const ci=S.customProds.findIndex(x=>x.id===id);
    if(ci>=0)S.customProds[ci]=PLANOGRAM.find(x=>x.id===id);
    saveS();
  } else {
    const newId=uid();
    const np={id:newId,name,rack,shelf,facing,lines,price,barcode,alshaya,notch:notchRaw,shelfType:'',stock};
    PLANOGRAM.push(np);S.customProds.push(np);
    S.stockOverrides[newId]=stock;setExtra(newId,extraData);
    if(_pendingImg)S.prodImgs[newId]=_pendingImg;
    saveS();
  }
  closeModal();renderRacks();
  if(document.getElementById('screen-detail').classList.contains('active'))renderDetail();
  renderSummary();
}
function renderSummary(){
  const all=PLANOGRAM;const total=all.length;
  const low=all.filter(p=>{const v=getStock(p.id);return v>0&&v<5;}).length;
  const out=all.filter(p=>getStock(p.id)===0).length;
  const exp=all.filter(p=>isNearExpiry(p.id)).length;
  const val=all.reduce((s,p)=>s+(p.price*getStock(p.id)),0);
  document.getElementById('summaryStats').innerHTML=`
    <div class="stat-card"><div class="sic" style="background:#EEF2FF">📦</div><div><div class="sv">${total}</div><div class="sl">Total SKUs</div></div></div>
    <div class="stat-card"><div class="sic" style="background:var(--amber-bg)">⚠️</div><div><div class="sv">${low}</div><div class="sl">Low Stock</div></div></div>
    <div class="stat-card"><div class="sic" style="background:var(--red-bg)">🚫</div><div><div class="sv">${out}</div><div class="sl">Out of Stock</div></div></div>
    <div class="stat-card"><div class="sic" style="background:var(--red-bg)">🗓</div><div><div class="sv" style="color:var(--red)">${exp}</div><div class="sl">Near Expiry</div></div></div>`;
  const nearExp=all.filter(p=>isNearExpiry(p.id));
  if(nearExp.length>0){
    let bHtml=`<div class="expiry-banner" style="margin-bottom:14px"><div class="expiry-banner-title">🚨 Near Expiry Products (${nearExp.length})</div><div class="expiry-grid">`;
    nearExp.forEach(p=>{
      const ex=getExtra(p.id);const d=daysUntilExpiry(ex.expiry);
      bHtml+=`<div class="expiry-card"><div class="expiry-name">${esc(p.name)}</div><div class="expiry-meta expiry-days-red">⏰ ${d} days · ${ex.expiry}</div><div class="expiry-shelf">Shelf ${shelfCode(p.rack,p.shelf)}</div></div>`;
    });
    bHtml+='</div></div>';
    document.getElementById('nearExpiryBanner').innerHTML=bHtml;
  } else {
    document.getElementById('nearExpiryBanner').innerHTML='';
  }
  renderAllList(document.getElementById('searchInp')?.value||'');
}
function renderAllList(q){
  let prods=[...PLANOGRAM];
  if(q)prods=prods.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.barcode?.includes(q)||p.alshaya?.toLowerCase().includes(q.toLowerCase()));
  prods.sort((a,b)=>{const ae=isNearExpiry(a.id)?0:1;const be=isNearExpiry(b.id)?0:1;if(ae!==be)return ae-be;return a.rack-b.rack||a.shelf-b.shelf;});
  const el=document.getElementById('allList');
  if(!prods.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No products found.</div>';return;}
  const sec=r=>sectionFor(r);
  el.innerHTML=prods.map(p=>{
    const v=getStock(p.id);const st=stockStatus(v);const s=sec(p.rack);const ne=isNearExpiry(p.id);
    const ex=getExtra(p.id);const days=daysUntilExpiry(ex.expiry);
    return `<div class="all-prod-card${ne?' near-expiry':''}" style="border-left-color:${ne?'var(--red)':s.color}">
      <div style="flex:1;min-width:0">
        <div class="pm-name">${esc(p.name)}</div>
        <div class="pm-tags" style="margin-top:4px">
          <span class="tag" style="background:${s.bg};color:${s.color};font-weight:700">${shelfCode(p.rack,p.shelf)}</span>
          <span class="tag tl2">F:${p.facing}</span>
          ${ne?`<span class="tag texp">⚠️ ${days}d</span>`:''}
          ${p.barcode?`<span class="tag" style="background:#F8F8F8;color:#666;font-size:9px">${esc(p.barcode.slice(0,14))}</span>`:''}
        </div>
        ${ex.remarks?`<div style="font-size:10px;color:var(--muted);margin-top:3px;font-style:italic">📝 ${esc(ex.remarks.slice(0,60))}${ex.remarks.length>60?'…':''}</div>`:''}
      </div>
      <div class="prod-right">
        <span class="chip ${ne?'c-exp':st.chip}">${ne?'EXPIRY':st.label}</span>
        <div class="stock-ctrl">
          <button class="sbtn" onclick="adjStockSum('${p.id}',-1)">−</button>
          <span class="snum">${v}</span>
          <button class="sbtn" onclick="adjStockSum('${p.id}',1)">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function adjStockSum(id,d){setStock(id,getStock(id)+d);renderSummary();renderRacks();}
function filterAll(v){renderAllList(v);}
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  const nb=document.getElementById('nav-'+tab);if(nb)nb.classList.add('active');
  document.getElementById('topAddBtn').style.display=tab==='detail'?'none':'';
  if(tab==='summary')renderSummary();
}
function goBack(){switchTab('racks');renderRacks();}
loadS();
renderRacks();
renderSummary();
</script>
</body>
</html>
